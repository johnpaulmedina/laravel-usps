        - Resources
      summary: Return IMB-level errors for a single callback key transaction
      description: Return IMB-level errors for a single callback key transaction
      operationId: get-detail-data
      parameters:
        - name: CRID
          in: path
          description: The campaign submitter's Customer Registration ID (CRID).
          required: true
          schema:
            type: string
        - name: callbackKey
          in: path
          description: The callback key associated with the campaign.
          required: true
          schema:
