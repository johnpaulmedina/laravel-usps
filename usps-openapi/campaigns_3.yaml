    IMBsResponseLessThan25Success:
      title: IMBsResponseLessThan25Success
      type: object
      properties:
        IMBs:
          type: array
          items:
            type: object
            properties:
              IMB:
                type: string
                description: The IMB successfully added to the campaign.
              pieceID:
                type: integer
                description: The unique pieceID of the IMB for the campaign. This pieceID will be unique if an IMB is added to multiple campaigns.
                example: 2300001
    
    IMBsResponseMoreThan25Success:
      title: IMBsResponseMoreThan25Success
      type: object
      properties:
        callbackKey:
          type: string
