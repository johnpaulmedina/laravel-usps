---
openapi: 3.0.0
info:
  title: Informed Delivery Mail Campaigns
  description: |   
    Contact Us: [USPS Informed Delivery API Support](mailto:uspsinformeddeliveryapi@usps.gov) | [Terms of Service](https://about.usps.com/termsofuse.htm)
    
    This API allows users to manage interactive Informed Delivery Mail Campaigns. Refer to the [Informed Delivery API PostalPro](https://postalpro.usps.com/idapi) page for more information.  Informed Delivery campaigns allow mailers to tie their physical mailpieces to interactive Informed Delivery campaigns to be displayed in the Informed Delivery Daily Digest email, the Informed Delivery Consumer Portal website, and Informed Delivery mobile application during the campaign duration. The endpoints available in this API allow mailers to do the following:

      - Create a new Informed Delivery mail campaign (MID, SEQ, or NON-SEQ)
      - Edit or cancel a previously submitted Informed Delivery mail campaign
      - View details on all Informed Delivery mail campaigns for a given CRID
      - View details on a single Informed Delivery mail campaign
      - Add IMbs to NON-SEQ Informed Delivery campaigns
    
    To set up a new Informed Delivery mail campaign, mailers will need to provide a start date and end date for the campaign, Ride-along and Representative images to be displayed as part of the Informed Delivery digital campaign (provided in base64 format), as well as a Target URL that Informed Delivery users will be taken to when clicking on the mail campaign hyperlink or image.
    
    In general, Informed Delivery will display an Informed Delivery mail campaign for any mailpieces associated with the campaign during the campaign's duration. When setting up a new Informed Delivery campaign, mailers have different options for how their mailpieces will be associated to campaigns.

      - A01/NON-SEQ campaign type - “shell” campaigns that are submitted first with no associated serial ranges. Once the campaign is submitted, full IMbs are then added to the campaign using a separate API request.
      - A02/MID campaign type – any mailpieces with the same MID as the campaign's MID are tied to the digital Informed Delivery campaign.
      - A03/SEQ campaign type - Any mailpieces with the same MID as the campaign's MID and a serial number that falls within the campaign's serial range are tied to the digital Informed Delivery campaign.

      To gain access to the ID APIs for a given CRID, mailers will need to undergo an onboarding process with the Informed Delivery Program Office. At the outset of this onboarding, mailers will need to have an Apigee client application created in the Customer Onboarding Portal (COP) that has access to the Informed Delivery Mail Campaigns API product for CRIDs that they have been given access to. Informed Delivery Mailer Campaign Portal access (available in the BCG) is a pre-requisite for accessing the Informed Delivery Mail Campaign API.

  version: 1.2.0
  x-reviewed-on: 2025-12-10
  x-updated-on: 2026-01-15
servers:
  - url: https://apis.usps.com/informed-delivery-campaigns
    description: Production Environment Endpoint
security:
  - OAuth:
    - campaigns
paths:
  /campaigns/{CRID}:
    post:
      tags:
        - Resources
      summary: Create an Informed Delivery campaign
      description: Create a new Informed Delivery campaign
      operationId: post-campaigns
      parameters:
        - name: CRID
          in: path
          description: The campaign submitter's Customer Registration ID (CRID).
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Campaign'
        required: true
      responses:
        "201":
          description: Created - Location Header has Campaign Detail API URL
          headers:
            Location:
              style: simple
              explode: false
              schema:
                type: string
                example: /campaign/v3
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Campaign Duplicate:
                  $ref: '#/components/examples/campaignDuplicate'
                Campaign MID Serial Ovrerlap:
                  $ref: '#/components/examples/campaignMIDSerialOverlap'
                Campaign MID Ovrerlap:
                  $ref: '#/components/examples/campaignMIDOverlap'
        "401":
          description: Unauthorized
          headers:
            WWW-Authenticate:
              $ref: '#/components/headers/WWWAuthenticate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "429":
          description: Too Many Requests. Too many requests have been received from client in a short amout of time.
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        default:
          description: An unanticipated error has occurred.
      security:
        - OAuth:
            - campaigns
    get:
      tags:
        - Resources
      summary: Search all campaigns for Submitter CRID
      description: Search, filter, sort, and paginate campaigns for a given Submitter CRID
      operationId: query-mail-campaigns
      parameters:
        - name: CRID
          in: path
          description: The campaign submitter's Customer Registration ID (CRID).
          required: true
          schema:
            type: string
        - name: offset
          in: query
          description: Number of records to skip before returning results. This field must be either be 0 or be a multiple of the limit variable (e.g., is limit is 10, offset can be 0, 10, 20, etc.). If no offset parameter is included at all, a default of 0 will be used.
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0            
        - name: limit
          in: query
          description: Number of results per page. This field must be a number between 1 and 1000. If no limit parameter is included at all, a default of 100 will be used.
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: sort
          in: query
          description: Sorting order for results. To use this, an integrator can input any column that they would like to sort by (e.g., sort=brandDisplayName,desc). An integrator can indicate either an ascending or descending order by inputting asc or desc after the field name. If asc or desc is not included, then the field will be sorted ascending by default. If no sort parameter is included at all, the response will be sorted by lastModifiedDatetime,desc by default.
          required: false
          schema:
            type: string
        - name: ezsearch
          in: query
          description: This filter will do a "contains" search across the Campaign Code, Brand Display Name, and Campaign Title fields. For example inputting "Sale" will return any campaign for the CRID with a Campaign Title, Campaign Code, or Brand Display Name that contains the word "Sale".
          required: false
          schema:
            type: string
        - name: barcodeCount
          in: query
          description: |-
            Number of IMBs associated with a NON-SEQ campaign. This count will always be 0 for MID, SEQ, and SAT campaigns.
          required: false
          schema:
            type: number
        - name: brandDisplayName
          in: query
          description: User defined field that is placed on Informed Delivery's UIs when campaign is displayed.          
          required: false
          schema:
            type: string
        - name: campaignCode
          in: query
          description: User defined field that describes the campaign being created. This field is put into the campaign reports created for the campaign.          
          required: false
          schema:
            type: string
        - name: MID
          in: query
          description: "The Mailer ID for the campaign - this field will be used to match IMBs to MID and SEQ type campaigns. If an IMB has the Mailer ID (MID) associated with an active MID/SEQ campaign, it is eligible to be displayed with the campaign's image and Target URL."        
          required: false
          schema:
            type: string
        - name: mailpieceShape
          in: query
          description: |-
            Identifier on what types of mail pieces the campaign should be applied to
             * LT (Letter)
             * CD (Card)
             * FL (Flat) 
            
            When filtering, either the LT/CD/FL or Letter/Card/Flat values can be used.
          required: false
          schema:
            type: string
        - name: campaignTitle
          in: query
          description: User defined field that describes the campaign being created. This field is put into the campaign reports created for the campaign.          
          required: false
          schema:
            type: string
        - name: campaignType
          in: query
          description: |-
            Identifier on how the campaign should be applied to mail pieces
             * A01 (Non-Sequential or NON-SEQ): Individual barcodes added to campaign after submission
             * A02 (Mailer ID or MID): All mailpieces with given Mailer ID added to campaign
             * A03 (Sequential or SEQ): All mailpieces with given Mailer ID and serial range added to campaign
             * A04 (Saturation or SAT): Mailpieces will be matched to saturation pieces
             
             When filtering, either the A01/A02/A03/A04 or NON-SEQ/MID/SEQ/SAT values can be used.
          required: false
          schema:
            type: string
        - name: createdDatetime
          in: query
          description: Date of initial campaign creation. For this parameter to work correctly, it must be used in conjunction with a >, >=, <, or <= operator (e.g, "createdDatetime>2025-07-05").
          required: false
          schema:
            type: string
            format: date
        - name: campaignSource
          in: query
          description: "Gives information on system that was originally used to create campaign (e.g. API, PO!, MCP, Admin Console). This field will not update if campaign is subsequently edited or cancelled."          
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          description: Last day campaign will be displayed
          required: false
          schema:
            type: string
            format: date
        - name: endSerial
          in: query
          description: The upper limit of the serial range for SEQ type campaigns. This field is required for SEQ campaigns only and is not allowed for submission for any other campaign types.
          required: false
          schema:
            type: string
        - name: lastModifiedDatetime
          in: query
          description: Date of last update made to campaign, inclusive of status changes that occur when a campaign activates or completes. For this parameter to work correctly, it must be used in conjunction with a >, >=, <, or <= operator (e.g, "lastModifiedDatetime>2025-07-05").
          required: false
          schema:
            type: string
            format: date
        - name: lastModifiedSource
          in: query
          description: "Gives information on system that was used to make last update to campaign (e.g. API, PO!, MCP, Admin Console). This field will update each time a campaign is created, edited, or cancelled."
          required: false
          schema:
            type: string
        - name: lastModifiedUsername
          in: query
          description: "Gives information on Cust Reg user name associated with last update to campaign. This field will update each time a campaign is created, edited, or cancelled."
          required: false
          schema:
            type: string
        - name: mailOwnerCRID
          in: query
          description: Customer Registration ID (CRID) of the Mail Owner associated with the Informed Delivery campaign.
          required: false
          schema:
            type: string
        - name: mailOwnerName
          in: query
          description: Name of the Mail Owner associated with the Informed Delivery campaign.
          required: false
          schema:
            type: string
        - name: postalOneSaturationJobID
          in: query
          description: "A PostalOne! generated unique identifier for a saturation type campaign. This field should not be used for NON-SEQ, MID, or SEQ campaigns."
          required: false
          schema:
            type: string
        - name: isShareable
          in: query
          description: "An indicator dictating whether a campaign is eligible for Social Sharing. By default, mail campaigns will be displayed alongside options to share the campaign to various social media platforms. If a mailer opts out of this feature, then these options will not be displayed with the campaign."
          required: false
          schema:
            type: boolean
        - name: startDate
          in: query
          description: First day campaign will be displayed
          required: false
          schema:
            type: string
            format: date
        - name: startSerial
          in: query
          description: The lower limit of the serial range for SEQ type campaigns. This field is required for SEQ campaigns only and is not allowed for submission for any other campaign types.
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: "Status of campaign - possible values include Submitted, Active, Complete, Inactive, Draft, Cancelled, and Deleted"
          required: false
          schema:
            type: string
            enum: [SUBMITTED,ACTIVE,COMPLETE,CANCELLED,DELETED,DRAFT,INACTIVE]
        - name: submittedDatetime
          in: query
          description: Date of initial campaign submission. For this parameter to work correctly, it must be used in conjunction with a >, >=, <, or <= operator (e.g, "submittedDatetime>2025-07-05").
          required: false
          schema:
            type: string
            format: date
        - name: hasUrlParams
          in: query
          description: "An indicator dictating whether a campaign is eligible for MID and Serial Number parameters to be appended to the end of the Target URL for tracking purposes. By default, the MID and Serial Number parameters for a given mailpiece will be added to end of the Target URL that users are taken to upon clicking on a campaign. If a mailer opts out of this feature, then these MID and Serial Number fields will not be appended to the campaign's Target URL."
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryString'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Campaign Invalid Parameter:
                  $ref: '#/components/examples/queryStringInvalidParameter'                
                Campaign Invalid Sort Value:
                  $ref: '#/components/examples/queryStringInvalidSortValue'                
        default:
          description: An unanticipated error has occurred.
      security:
        - OAuth:
            - campaigns
  /campaigns/{CRID}/{campaignID}:
    get:
      tags:
        - Resources
      summary: Return a single Informed Delivery campaign
      description: Return a single Informed Delivery campaign for a given Submitter CRID and Campaign ID
      operationId: get-campaigns
      parameters:
        - name: CRID
          in: path
          description: The campaign submitter's Customer Registration ID (CRID).
          required: true
          style: simple
          explode: true
          schema:
            type: string
        - name: campaignID
          in: path
          description: ID of Informed Delivery campaign
          required: true
          style: simple
          explode: true
          schema:
            type: string
      responses:
        "200":
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Campaign Invalid Campaign ID for Submitter CRID:
                  $ref: '#/components/examples/invalidCampaignIDforSubmitterCRID'                   
        "401":
          description: Unauthorized
          headers:
            WWW-Authenticate:
              $ref: '#/components/headers/WWWAuthenticate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "429":
          description: Too Many Requests. Too many requests have been received from client in a short amout of time.
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        default:
          description: An unanticipated error has occurred.
      security:
        - OAuth:
            - campaigns
    delete:
      tags:
        - Resources
      summary: Cancel an Informed Delivery campaign
      description: Cancel a previously existing Informed Delivery campaign
      operationId: delete-campaigns
      parameters:
        - name: CRID
          in: path
          description: The campaign submitter's Customer Registration ID (CRID).
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: campaignID
          in: path
          description: ID of Informed Delivery campaign
          required: true
          style: simple
          explode: false
          schema:
            type: string
      responses:
        "200":
          description: Successful Operation
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Campaign Cancelled Invalid:
                  $ref: '#/components/examples/campaignCancelInvalid'
                CampaignID Delete Invalid:
                  $ref: '#/components/examples/campaignIDDeleteInvalid'
                Campaign Invalid Campaign ID for Submitter CRID:
                  $ref: '#/components/examples/invalidCampaignIDforSubmitterCRID'                  
        "401":
          description: Unauthorized
          headers:
            WWW-Authenticate:
              $ref: '#/components/headers/WWWAuthenticate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "429":
          description: Too Many Requests. Too many requests have been received from client in a short amout of time.
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        default:
          description: An unanticipated error has occurred.
      security:
        - OAuth:
            - campaigns
    put:
      tags:
        - Resources
      summary: Edit an Informed Delivery campaign
      description: Edit a previously existing Informed Delivery campaign
      operationId: put-campaigns
      parameters:
        - name: CRID
          in: path
          description: The campaign submitter's Customer Registration ID (CRID).
          required: true
          schema:
            type: string
        - name: campaignID
          in: path
          description: ID of Informed Delivery campaign
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignEdit'
        required: true
      responses:
        "200":
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignEditResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Campaign Duplicate:
                  $ref: '#/components/examples/campaignDuplicate'
                Campaign MID Serial Ovrerlap:
                  $ref: '#/components/examples/campaignMIDSerialOverlap'
                Campaign MID Ovrerlap:
                  $ref: '#/components/examples/campaignMIDOverlap'
                Campaign Invalid Campaign ID for Submitter CRID:
                  $ref: '#/components/examples/invalidCampaignIDforSubmitterCRID'                  
      security:
        - OAuth:
            - campaigns
  /campaigns/{CRID}/{campaignID}/pieces:
    post:
      tags:
        - Resources
      summary: Add IMBs to a NON-SEQ campaign
      description: Add IMBs to an existing NON-SEQ campaign
      operationId: post-add IMB
      parameters:
        - name: CRID
          in: path
          description: The campaign submitter's Customer Registration ID (CRID).
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: campaignID
          in: path
          description: "Unique identifier for an Informed Delivery campaign, generated internally by Informed Delivery and returned for successfully created campaigns."
          required: true
          style: simple
          explode: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IMBsRequest'
        required: true
      responses:
        "201":
          description: Success with <= 25 IMBs
          headers:
            Location:
              style: simple
              explode: false
              schema:
                type: string
                example: /campaign/v3
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IMBsResponseLessThan25Success'
        "202":
          description: Success with > 25 IMBs
          headers:
            Location:
              style: simple
              explode: false
              schema:
                type: string
                example: /campaign/v3
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IMBsResponseMoreThan25Success'
        "207":
          description: Partial success of IMBs
          headers:
            Location:
              style: simple
              explode: false
              schema:
                type: string
                example: /campaign/v3
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IMBsPartialSuccess'
              examples:  
                Partial Success:
                  $ref: '#/components/examples/IMBsPartialSuccess'                   
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                -  $ref: '#/components/schemas/IMBsErrorMessage'
                -  $ref: '#/components/schemas/ErrorMessage'
              examples:
                Campaign Duplicate:
                  $ref: '#/components/examples/invalidCampaignIDforSubmitterCRID'     
                Campaign Ineligible for Adding IMbs:
                  $ref: '#/components/examples/CampaignNotEligibleForAddingIMbs'  
                IMB In Campaign:
                  $ref: '#/components/examples/IMBInCampaign'    
                IMB Invalid Format:
                  $ref: '#/components/examples/IMBInvalidFormat'                      
      security:
        - OAuth:
            - campaigns
  /campaigns/{CRID}/callback:
    get:
      tags:
        - Resources
      summary: Search all callback keys for  Submitter CRID
      description: Search all callback keys for Add Many IMB transactions performed by given Submitter CRID
      operationId: get-campaigns-callback
      parameters:
        - name: CRID
          in: path
          description: The campaign submitter's Customer Registration ID (CRID).
          required: true
          schema:
            type: string
        - name: offset
          in: query
          description: Number of records to skip before returning results. This field must be either be 0 or be a multiple of the limit variable (e.g., is limit is 10, offset can be 0, 10, 20, etc.). If no offset parameter is included at all, a default of 0 will be used.
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          description: Number of results per page. This field must be a number between 1 and 1000. If no limit parameter is included at all, a default of 100 will be used.
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: sort
          in: query
          description: Sorting order for results. To use this, an integrator can input any column that they would like to sort by (e.g., sort=submittedDatetime,desc). An integrator can indicate either an ascending or descending order by inputting asc or desc after the field name. If asc or desc is not included, then the field will be sorted ascending by default. If no sort parameter is included at all, the response will be sorted by submittedDatetime,desc by default.
          required: false
          schema:
            type: string
        - name: campaignID
          in: query
          description: ID of the Informed Delivery campaign associated with the callback key transaction.
          required: false
          schema:
            type: string
        - name: submittedDatetime
          in: query
          description: Date of initial callback key transaction. For this parameter to work correctly, it must be used in conjunction with a >, >=, <, or <= operator (e.g, "submittedDatetime>2025-07-05").
          required: false          
          schema:
            type: string
            format: date
        - name: totalBarcodes
          in: query
          description: The total number of barcodes in a single callback key transaction.
          required: false
          schema:
            type: number
        - name: totalBarcodesAdded
          in: query
          description: The total number of barcodes successfully added to the campaign via the callback key transaction.
          required: false
          schema:
            type: number
        - name: totalBarcodesFailed
          in: query
          description: The total number of barcodes that failed to be added to the campaign via the callback key transaction.
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Successful Operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  callbackKeys:
                    type: array
                    items:
                      type: object
                      properties:
                        callbackKey:
                          type: string
                          description: The callback key associated with the Add Many IMB transaction.
                        campaignID:
                          type: string
                          description: The campaign ID associated with the callback key transaction.
                        submitterCRID:
                          type: string
                          description: The submitter's CRID.
                        submitterTransactionID:
                          type: string
                          description: The submitter's transaction ID associated with the callback key transaction.
                        submittedDatetime:
                          type: string
                          description: Date and time of the callback key transaction.
                          format: date-time                          
                        totalBarcodes:
                          type: number
                          description: The total number of barcodes in the callback key transaction.
                        totalBarcodesAdded:
                          type: number
                          description: The total number of barcodes successfully added to the campaign via the callback key transaction.
                        totalBarcodesFailed:
                          type: number
                          description: The total number of barcodes that failed to be added to the campaign via the callback key transaction.
                        expirationDatetime:
                          type: string
                          description: Date of time that information on the callback key transaction is no longer available to be queried by the integrator. Callback key transactions expire 60 days after they are originally submitted.
                          format: date-time
                        processingStatus:
                          type: string
                          description: The processing status of the callback key transaction. This field can be SUBMITTED, PROCESSING, COMPLETE-ERRORS, COMPLETE-NOERRORS, or SYSTEM-FAILURE. Summary level and detail level details cannot be returned for a callback key if its status is still SUBMITTED or PROCESSING. If a transaction is still processing, an error will be returned if an integrator attempts to get summary or detail-level details on the callback key.
                        active:
                          type: boolean
                          description: Indicator field for whether details on the callback key transaction can still be returned based on whether the expiration date is in the future or past. If a transaction is no longer active, an error will be returned if an integrator attempts to get summary or detail-level details on the callback key.
                  metadata:
                    type: object
                    properties:
                      totalCount:
                        type: integer
                        description: The total number of items.
                      page:
                        type: integer
                        description: The current page number.
                      totalPages:
                        type: integer
                        description: The total number of pages.
                      limit:
                        type: integer
                        description: The number of items per page.
                      offset:
                        type: integer
                        description: The offset of the current page.
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Campaign Invalid Parameter:
                  $ref: '#/components/examples/queryStringInvalidParameter'                
                Campaign Invalid Sort Value:
