        status:
          type: string
          description: Status message giving user more information on the request.
          example: Your API request was received and is being processed.    
    IMBsPartialSuccess:
      title: IMBsPartialSuccess
      type: object
      properties:
        IMBs:
          type: array
          items:
            type: object
            properties:
