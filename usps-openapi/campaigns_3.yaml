                nullable: true                
                example: 2300001                
              errors:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      type: string
                      description: Title of error.
                    detail:
                      type: string
                      description: Details of error.
                    
    IMBsErrorMessage:
      title: IMBsErrorMessage
      type: object
      required:
        - IMBs
      properties:
        IMBs:
          type: array
          items:
            type: object
            properties:
              IMB:
                type: string
                description: The IMB included in the request.
              pieceID:
                type: integer
                description: The unique pieceID of the IMB for the campaign. This pieceID will be unique if an IMB is added to multiple campaigns.
                nullable: true                
                example: 12341521                    
              errors:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      type: string
